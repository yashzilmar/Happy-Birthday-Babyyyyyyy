<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i promise ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/global.css">
<style>
body { overflow: hidden; background: #1E1208; }

/* ── QUIET MORNING DESK ─────────────────────────────────── */
.promise-scene {
  position: fixed; inset: 0;
  background: linear-gradient(180deg, #EDE0C8 0%, #E4D4B4 35%, #6B4226 35.1%, #5A3820 100%);
}

/* Warm morning light through window */
.promise-scene::before {
  content: ''; position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(ellipse 65% 55% at 80% 20%, rgba(255,220,120,0.2) 0%, transparent 60%);
  pointer-events: none;
}

/* Candle glow (lower now — candle is burning down) */
.promise-scene::after {
  content: ''; position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(ellipse 40% 35% at 20% 55%, rgba(232,160,48,0.1) 0%, transparent 55%);
  pointer-events: none;
}

.wall { position: absolute; inset: 0 0 38% 0; background: linear-gradient(180deg,#EDE0C8,#E4D4B4); }
.wall::after {
  content: ''; position: absolute; inset: 0;
  background-image: repeating-linear-gradient(180deg,transparent,transparent 38px,rgba(160,120,70,0.05) 38px,rgba(160,120,70,0.05) 39px);
}

.desk { position: absolute; bottom: 0; inset: auto 0 0; height: 38%;
  background: linear-gradient(180deg,#6B4226,#5A3820); }
.desk::before {
  content: ''; position: absolute; inset: 0;
  background-image: repeating-linear-gradient(90deg,transparent,transparent 80px,rgba(255,255,255,0.02) 80px,rgba(255,255,255,0.02) 81px);
}
.desk-edge {
  position: absolute; bottom: 38%; left: 0; right: 0; height: 5px;
  background: linear-gradient(90deg,#9E7A52,#C4956A 30%,#C4956A 70%,#9E7A52);
  z-index: 8;
}

/* ── SMALL WINDOW (morning light) ────────────────────────── */
.sm-window {
  position: absolute; right: 5vw; top: 6vh;
  width: clamp(90px,11vw,140px); height: clamp(100px,13vh,160px);
  z-index: 5;
}
.sm-win-glass {
  position: absolute; inset: 10px;
  background: linear-gradient(160deg,#E8C87A 0%,#F5E0A0 40%,#E8D080 100%);
}
.sm-win-glass::before {
  content: ''; position: absolute; inset: 0; z-index: 2;
  background:
    linear-gradient(90deg,transparent calc(50%-1px),rgba(139,94,60,0.5) calc(50%-1px),rgba(139,94,60,0.5) calc(50%+1px),transparent calc(50%+1px)),
    linear-gradient(180deg,transparent calc(50%-1px),rgba(139,94,60,0.5) calc(50%-1px),rgba(139,94,60,0.5) calc(50%+1px),transparent calc(50%+1px));
}
.sm-win-out { position: absolute; inset: 0; border: 9px solid #8B6840; box-shadow: inset 0 0 0 2px #A07848; }
.sm-curtain { position: absolute; top:-6px; bottom:-6px; width: 22px; background: linear-gradient(90deg,#C9B8E8,#B8A8D8); z-index: 5; }
.sm-curtain-l { left:-18px; border-radius: 0 6px 6px 0; }
.sm-curtain-r { right:-18px; border-radius: 6px 0 0 6px; }

/* Morning sun entering */
.sun-ray {
  position: absolute; right: 5vw; top: 0;
  width: clamp(90px,11vw,140px);
  pointer-events: none; z-index: 4;
  overflow: hidden;
}
.sun-beam {
  position: absolute;
  width: 2px; height: 40vh;
  background: linear-gradient(180deg, rgba(255,220,120,0.25), transparent);
  transform-origin: top center;
  animation: beam-sway 6s ease-in-out infinite;
}
@keyframes beam-sway { 0%,100%{opacity:0.6} 50%{opacity:1} }

/* ── CANDLE (almost burned down) ────────────────────────── */
.promise-candle {
  position: absolute; left: 14%; bottom: 38%;
  transform: translateY(-100%); z-index: 12; cursor: none;
}

/* ── COFFEE (almost empty) ──────────────────────────────── */
.promise-coffee {
  position: absolute; left: 22%; bottom: 38%;
  transform: translateY(-100%); z-index: 12; cursor: none;
}

/* ── LAVENDER BOUQUET ───────────────────────────────────── */
.promise-lav {
  position: absolute; right: 12%; bottom: 38%;
  transform: translateY(-100%); z-index: 12;
  animation: lavender-sway 5s ease-in-out infinite;
}

/* ── PAGE HEADING ────────────────────────────────────────── */
.page-header {
  position: absolute; top: 4vh; left: 50%; transform: translateX(-50%);
  text-align: center; z-index: 10; width: 100%;
  pointer-events: none;
}

/* ── PROMISE PAPERS ──────────────────────────────────────── */
.promises-area {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 15; pointer-events: none;
}

.promise-paper {
  position: absolute;
  cursor: none;
  pointer-events: auto;
  transition: transform 0.35s var(--ease-spring), box-shadow 0.35s ease, z-index 0s;
}
.promise-paper:hover {
  z-index: 50;
}

/* Paper types */
.pp-sticky {
  padding: 14px 16px;
  box-shadow: 2px 3px 10px rgba(0,0,0,0.12);
  font-family: var(--font-hand);
  font-size: clamp(12px,1.5vw,14px);
  color: var(--text-dark);
  line-height: 1.75;
  min-width: 120px; max-width: 160px;
}
.pp-sticky:hover { transform: var(--rot,rotate(0deg)) scale(1.08) translateY(-6px) !important; }

.pp-note {
  background: var(--warm-white);
  border: 1px solid var(--cream-dark);
  padding: 16px 18px;
  box-shadow: var(--shadow-paper);
  font-family: var(--font-sub);
  font-size: clamp(13px,1.5vw,15px);
  color: var(--text-dark);
  line-height: 1.8;
  max-width: 200px;
}
.pp-note:hover { transform: var(--rot,rotate(0deg)) scale(1.05) translateY(-5px) !important; }
.pp-note::after {
  content: ''; position: absolute; inset: 3px;
  border: 1px dashed rgba(196,168,98,0.25); pointer-events: none;
}

.pp-torn {
  background: #FAF6EE;
  padding: 14px 16px 20px;
  box-shadow: var(--shadow-paper);
  font-family: var(--font-hand);
  font-size: clamp(12px,1.4vw,14px);
  color: var(--text-dark);
  line-height: 1.75;
  max-width: 170px;
  clip-path: polygon(0 0, 100% 0, 100% 88%, 95% 90%, 88% 87%, 80% 92%, 72% 88%, 60% 93%, 50% 89%, 38% 94%, 28% 88%, 18% 92%, 8% 87%, 0 90%);
}
.pp-torn:hover { transform: var(--rot,rotate(0deg)) scale(1.06) translateY(-5px) !important; }

/* Tape on papers */
.ptape {
  position: absolute; width: 44px; height: 14px;
  background: rgba(232,220,180,0.65);
  border: 1px solid rgba(196,168,98,0.2);
  box-shadow: 0 1px 2px rgba(0,0,0,0.07);
  border-radius: 1px;
}

/* Placeholder inside paper */
.paper-placeholder {
  background: rgba(255,249,220,0.7);
  border: 1px dashed rgba(196,168,98,0.5);
  border-radius: 3px; padding: 8px 10px;
  font-family: var(--font-hand); font-size: 11px;
  color: var(--gold-dark); min-height: 40px;
  display: flex; align-items: center; justify-content: center;
  text-align: center; line-height: 1.5;
}
.paper-placeholder .plabel {
  display: block; font-family: var(--font-sub); font-size: 8px;
  letter-spacing: 1px; text-transform: uppercase; opacity: 0.6; margin-bottom: 4px;
}

/* ── CONTINUE ──────────────────────────────────────────── */
.p7-continue {
  position: fixed; bottom: 28px; right: 36px;
  z-index: 200; opacity: 0; transition: opacity 0.8s ease 0.5s;
}
.p7-continue.show { opacity: 1; }
</style>
</head>
<body>
<div id="page-transition"></div>
<canvas id="dust-canvas"></canvas>

<div class="promise-scene">
  <div class="wall"></div>
  <div class="desk"></div>
  <div class="desk-edge"></div>

  <!-- Morning window -->
  <div class="sm-window">
    <div class="sm-win-glass"></div>
    <div class="sm-win-out"></div>
    <div class="sm-curtain sm-curtain-l"></div>
    <div class="sm-curtain sm-curtain-r"></div>
  </div>

  <!-- Sun rays through window -->
  <div class="sun-ray" id="sun-ray"></div>

  <!-- Candle (almost burned down — thinner, shorter) -->
  <div class="promise-candle">
    <svg width="22" height="55" viewBox="0 0 22 55" fill="none">
      <rect x="6" y="22" width="10" height="30" rx="2" fill="#F0E8D4"/>
      <path d="M6,28 Q4,32 5,40 L6,40z" fill="#E0D4BC"/>
      <line x1="11" y1="22" x2="11" y2="16" stroke="#5C4A38" stroke-width="1"/>
      <g style="animation:flame-dance 2.2s ease-in-out infinite;transform-origin:11px 14px;">
        <ellipse cx="11" cy="14" rx="3.5" ry="6" fill="#F5A623" opacity="0.9"/>
        <ellipse cx="11" cy="16" rx="2" ry="4" fill="#FFD060"/>
        <ellipse cx="11" cy="18" rx="1" ry="2" fill="white" opacity="0.8"/>
      </g>
    </svg>
  </div>

  <!-- Coffee (almost empty) -->
  <div class="promise-coffee" onclick="coffeePromise(event)">
    <svg width="38" height="44" viewBox="0 0 38 44" fill="none">
      <ellipse cx="19" cy="40" rx="17" ry="4" fill="#8B6840" opacity="0.6"/>
      <path d="M4,18 Q4,38 19,38 Q34,38 34,18 Z" fill="#6B4226"/>
      <ellipse cx="19" cy="18" rx="15" ry="4.5" fill="#8B5E3C"/>
      <!-- Coffee level low -->
      <ellipse cx="19" cy="32" rx="12" ry="2.5" fill="#3D1C08"/>
      <path d="M34,22 Q43,22 43,30 Q43,38 34,35" stroke="#5A3520" fill="none" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Minimal steam — nearly done -->
      <path d="M19,16 Q20,11 19,7" stroke="#C9B8E8" fill="none" stroke-width="1.4" stroke-linecap="round"
            style="animation:steam-waft-2 3.5s ease-in-out infinite;transform-origin:19px 16px;opacity:0.5;"/>
    </svg>
  </div>

  <!-- Lavender bouquet -->
  <div class="promise-lav" onclick="lavPromise(event)">
    <svg width="32" height="58" viewBox="0 0 32 58" fill="none">
      <path d="M16,56 L16,16" stroke="#9CAF88" stroke-width="1.3"/>
      <path d="M16,40 Q9,30 7,25" stroke="#9CAF88" stroke-width="1.1"/>
      <path d="M16,35 Q23,25 25,20" stroke="#9CAF88" stroke-width="1.1"/>
      <ellipse cx="7" cy="23" rx="3" ry="5" fill="#C9B8E8" transform="rotate(-20 7 23)"/>
      <ellipse cx="25" cy="18" rx="3" ry="5" fill="#B8A8D8" transform="rotate(20 25 18)"/>
      <ellipse cx="16" cy="11" rx="2.5" ry="5.5" fill="#C9B8E8"/>
      <ellipse cx="11" cy="7" rx="2" ry="4" fill="#D8C8F0" transform="rotate(-12 11 7)"/>
      <ellipse cx="21" cy="7" rx="2" ry="4" fill="#B8A8D8" transform="rotate(12 21 7)"/>
      <ellipse cx="16" cy="3" rx="1.6" ry="3" fill="#C9B8E8"/>
    </svg>
  </div>

</div><!-- /promise-scene -->

<!-- Page header -->
<div class="page-header">
  <div style="font-family:var(--font-display);font-size:clamp(24px,4vw,44px);color:var(--coffee);font-style:italic;opacity:0;animation:slide-up 0.8s ease 0.3s forwards;text-shadow:1px 1px 0 rgba(255,255,255,0.3);">
    i promise
  </div>
  <div style="font-family:var(--font-hand);font-size:clamp(13px,1.6vw,17px);color:var(--text-light);opacity:0;animation:fade-in 0.8s ease 1s forwards;margin-top:4px;">
    ✦ not grand gestures. just small daily choices. always u. ✦
  </div>
</div>

<!-- All promise papers scattered -->
<div class="promises-area" id="promises-area">
  <!-- Papers injected by JS -->
</div>

<!-- Continue -->
<div class="p7-continue" id="p7-continue">
  <button style="background:none;border:none;cursor:none;" onclick="goTo('page8.html')">
    <div style="font-family:var(--font-hand);font-size:12px;color:var(--text-muted);margin-bottom:6px;text-align:right;">almost time for the birthday... ✦</div>
    <div style="background:var(--lavender);color:white;padding:12px 26px;border-radius:30px;font-family:var(--font-hand);font-size:16px;box-shadow:0 4px 20px rgba(155,133,201,0.4);transition:transform 0.3s;"
         onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
      happy birthday ♡
    </div>
  </button>
</div>

<div class="music-invite" id="music-invite"><div class="music-invite-card" onclick="Audio$.play()"><p>✦ tap to play our song...</p><small>Wada Karo</small></div></div>
<div class="music-player" id="music-player"><div class="music-player-inner"><div class="vinyl-disc-wrap" id="vinyl"></div><button id="music-toggle" class="music-btn">▶</button><span class="music-song-name">Wada Karo...</span></div></div>

<script src="js/global.js"></script>
<script>
'use strict';

/* ── SUN RAYS ───────────────────────────────────────────── */
(function() {
  const sr = document.getElementById('sun-ray');
  const angles = [-15, -5, 5, 15, 25];
  angles.forEach((a, i) => {
    const beam = document.createElement('div');
    beam.className = 'sun-beam';
    beam.style.cssText = `left:${30+i*12}%;top:6vh;transform:rotate(${a}deg);opacity:${0.4+Math.random()*0.3};animation-delay:${i*0.4}s;`;
    sr.appendChild(beam);
  });
})();

/* ── PROMISE PAPERS DATA ───────────────────────────────── */
const PROMISES = [
  {
    type:'sticky', bg:'#FFF9D0', rot:-3,
    pos:{ left:'6%', top:'15%' },
    content: null,
    placeholder: 'Promise #1\n(write it here — something u will always do for her)',
  },
  {
    type:'note', rot:2,
    pos:{ left:'28%', top:'12%' },
    content: null,
    placeholder: 'Promise #2\n(something about being there, no matter what)',
  },
  {
    type:'sticky', bg:'#F0EBFA', rot:-1.5,
    pos:{ left:'52%', top:'10%' },
    content: null,
    placeholder: 'Promise #3\n(something small and daily — the kind she'd never expect)',
  },
  {
    type:'torn', rot:3,
    pos:{ left:'74%', top:'16%' },
    content: null,
    placeholder: 'Promise #4\n(the one that matters most to u)',
  },
  {
    type:'note', rot:-2,
    pos:{ left:'14%', top:'46%' },
    content: null,
    placeholder: 'Promise #5\n(about the bike ride, the internship, coming back)',
  },
  {
    type:'sticky', bg:'#E8F5E0', rot:1.8,
    pos:{ left:'40%', top:'44%' },
    content: null,
    placeholder: 'Promise #6\n(about never letting her forget how loved she is)',
  },
  {
    type:'torn', rot:-2.5,
    pos:{ left:'65%', top:'42%' },
    content: null,
    placeholder: 'Promise #7\n(a funny one — u know what she needs to hear)',
  },
];

/* ── RENDER PAPERS ─────────────────────────────────────── */
const area = document.getElementById('promises-area');

PROMISES.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = `promise-paper`;
  el.style.cssText = `
    ${Object.entries(p.pos).map(([k,v]) => `${k}:${v}`).join(';')};
    transform: rotate(${p.rot}deg);
    --rot: rotate(${p.rot}deg);
    opacity: 0;
    transition: transform 0.35s var(--ease-spring), box-shadow 0.35s ease, opacity 0.5s ease ${i*0.12}s;
    z-index: ${5+i};
  `;

  const inner = document.createElement('div');

  if (p.type === 'sticky') {
    inner.className = 'pp-sticky';
    inner.style.background = p.bg || '#FFF9D0';
  } else if (p.type === 'note') {
    inner.className = 'pp-note';
  } else {
    inner.className = 'pp-torn';
  }

  inner.style.position = 'relative';

  if (p.content) {
    inner.style.fontFamily = 'var(--font-hand)';
    inner.style.fontSize   = 'clamp(12px,1.4vw,14px)';
    inner.textContent = p.content;
  } else {
    const ph = document.createElement('div');
    ph.className = 'paper-placeholder';
    ph.innerHTML = `<div><span class="plabel">✦ Promise ✦</span>${p.placeholder.replace(/\n/g,'<br>')}</div>`;
    inner.appendChild(ph);
  }

  // Tape strip on top
  const tape = document.createElement('div');
  tape.className = 'ptape';
  tape.style.cssText = `top:-7px;left:50%;transform:translateX(-50%) rotate(${(Math.random()-0.5)*10}deg);`;
  el.appendChild(tape);
  el.appendChild(inner);

  el.addEventListener('click', e => {
    burst(e.clientX, e.clientY, {count:10, colors:['#C9B8E8','#E8B4B8','#C4A862']});
    Store.discover('promise_' + i);
    checkProgress();
  });

  area.appendChild(el);

  // Stagger fade in
  setTimeout(() => { el.style.opacity = '1'; }, 200 + i*120);
});

function coffeePromise(e) { secretMessage('the last of tonight\'s coffee ☕ — morning came fast', e.clientX, e.clientY-40); }
function lavPromise(e)    { launchPetals(8,'#C9B8E8'); secretMessage('always ur favourite colour 🌿', e.clientX, e.clientY-40); }

function checkProgress() {
  const clicked = Store.get().discoveries.filter(d => d.startsWith('promise_')).length;
  if (clicked >= 3) {
    document.getElementById('p7-continue').classList.add('show');
    Store.pageComplete(7);
  }
}

setTimeout(() => {
  document.getElementById('p7-continue').classList.add('show');
  Store.pageComplete(7);
}, 18000);
</script>
</body>
</html>
