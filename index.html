<style>
body { overflow:hidden; }

/* Envelope float on hero */
#hero-envelope { animation:gentle-float 4s ease-in-out infinite; transform-origin:690px 380px; transform-box:fill-box; }
/* Candle flame */
#candle-flame-g { animation:flame-dance 1.8s ease-in-out infinite; transform-box:fill-box; transform-origin:50% 100%; }
/* Steam */
#steam-a { animation:steam-waft-1 2.8s ease-in-out 0s infinite; transform-box:fill-box; transform-origin:50% 100%; }
#steam-b { animation:steam-waft-2 2.8s ease-in-out 0.7s infinite; transform-box:fill-box; transform-origin:50% 100%; }
#steam-c { animation:steam-waft-3 2.8s ease-in-out 1.4s infinite; transform-box:fill-box; transform-origin:50% 100%; }
/* Cat */
#cat-body { animation:cat-breathe 3.2s ease-in-out infinite; transform-box:fill-box; transform-origin:50% 50%; }
#cat-tail { animation:cat-tail 5s ease-in-out infinite; transform-box:fill-box; transform-origin:0% 0%; }
/* Dog tail */
#dog-tail { animation:dog-tail 0.7s ease-in-out infinite alternate; transform-box:fill-box; transform-origin:0% 50%; }
/* Lavender */
#lav-group { animation:lavender-sway 4.5s ease-in-out infinite; transform-box:fill-box; transform-origin:50% 100%; }
/* Diya flame */
#diya-flame { animation:flame-dance 2.2s ease-in-out infinite; transform-box:fill-box; transform-origin:50% 100%; }
/* Fairy lights */
.fl-bulb { animation:fairy-breathe var(--dur,2.5s) ease-in-out var(--delay,0s) infinite; }
/* Stars */
.win-star { animation:star-twinkle var(--dur,3s) ease-in-out var(--delay,0s) infinite; }

/* Clickable SVG areas */
.svg-click { cursor:none; }
.svg-click:hover { filter:brightness(1.08); }

/* ── LETTER OVERLAY ── */
.letter-overlay {
  position:fixed; inset:0; z-index:80;
  background:rgba(20,10,4,0.88);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity 0.6s ease;
  backdrop-filter:blur(3px);
}
.letter-overlay.open { opacity:1; pointer-events:auto; }

.letter-parchment {
  background:linear-gradient(160deg,#FAF3E0,#F5EDD8,#F0E6C8);
  border:1px solid rgba(196,168,98,0.4);
  border-radius:6px;
  padding:clamp(28px,4vw,52px) clamp(28px,5vw,56px);
  max-width:min(90vw,560px);
  width:100%;
  box-shadow:0 20px 80px rgba(0,0,0,0.5);
  position:relative;
  max-height:72vh; overflow-y:auto;
  animation:letter-rise 0.9s var(--ease-spring) forwards;
}
.letter-parchment::before {
  content:''; position:absolute; inset:0; border-radius:6px; pointer-events:none;
  background-image:repeating-linear-gradient(180deg,transparent,transparent 33px,rgba(107,66,38,0.05) 33px,rgba(107,66,38,0.05) 34px);
}
.letter-parchment::after {
  content:''; position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:6px 0 0 6px;
  background:repeating-linear-gradient(180deg,var(--beige) 0px,var(--beige) 3px,var(--cream-dark) 3px,var(--cream-dark) 8px);
  opacity:0.5;
}
.letter-date { font-family:var(--font-hand);font-size:14px;color:var(--text-muted);display:block;margin-bottom:22px;position:relative;z-index:2; }
.letter-body { font-family:var(--font-sub);font-style:italic;font-size:clamp(18px,2.2vw,22px);color:var(--text-dark);line-height:2;position:relative;z-index:2;min-height:80px; }
.letter-flower { position:absolute;top:14px;right:18px;font-size:26px;opacity:0.22;transform:rotate(-12deg);pointer-events:none; }
.letter-placeholder { margin-top:24px;z-index:2;position:relative; }
.letter-closing { margin-top:28px;text-align:right;font-family:var(--font-hand);font-size:22px;color:var(--coffee);position:relative;z-index:2; }
.letter-parchment::-webkit-scrollbar { width:3px; }
.letter-parchment::-webkit-scrollbar-thumb { background:var(--gold);border-radius:3px; }

/* Continue bookmark */
.bookmark-wrap { margin-top:24px;display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;transition:opacity 0.8s ease; }
.bookmark-wrap.show { opacity:1; }
.btn-bookmark-p1 {
  background:var(--lavender);color:white;border:none;padding:16px 36px 24px;
  clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%);
  font-family:var(--font-hand);font-size:18px;cursor:none;
  box-shadow:0 4px 20px rgba(155,133,201,0.35);
  transition:all 0.3s var(--ease-spring);
}
.btn-bookmark-p1:hover { transform:translateY(-6px) scale(1.05);box-shadow:0 10px 36px rgba(155,133,201,0.5); }
.bookmark-sub { font-family:var(--font-hand);font-size:13px;color:rgba(255,240,220,0.6); }

/* Candle dim overlay */
.candle-dim { position:fixed;inset:0;background:rgba(10,5,2,0);pointer-events:none;z-index:30;transition:background 1.5s ease; }
.candle-dim.dimmed { background:rgba(10,5,2,0.6); }
</style>
</head>

<script src="js/global.js"></script>
<script>
'use strict';
/* ── FAIRY LIGHTS ── */
(function(){
  const g = document.getElementById('fairy-svg');
  const colors = ['#FFD580','#FFB3C6','#C9B8E8','#A8D8A8','#FFE0A0'];
  for(let i=0;i<30;i++){
    const x = (i/29)*1400+20;
    const y = 22 + Math.sin(i*0.7)*8;
    const c = colors[i%5];
    const el = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    el.setAttribute('cx',x); el.setAttribute('cy',y);
    el.setAttribute('rx','5'); el.setAttribute('ry','8');
    el.setAttribute('fill',c);
    el.setAttribute('class','fl-bulb');
    el.style.setProperty('--dur',(1.8+Math.random()*2)+'s');
    el.style.setProperty('--delay',(Math.random()*2)+'s');
    el.setAttribute('filter','url(#glow)');
    g.appendChild(el);
    // Wire between bulbs
    if(i>0){
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      const px = ((i-1)/29)*1400+20;
      const py = 22 + Math.sin((i-1)*0.7)*8;
      line.setAttribute('x1',px); line.setAttribute('y1',py);
      line.setAttribute('x2',x);  line.setAttribute('y2',y);
      line.setAttribute('stroke','rgba(196,168,98,0.22)');
      line.setAttribute('stroke-width','0.8');
      g.insertBefore(line, g.firstChild);
    }
  }
})();

/* ── ENVELOPE OPEN ── */
let opened=false;
function openEnvelope(){
  if(opened)return; opened=true;
  Audio$._startOnce?.();
  const seal=document.getElementById('wax-seal-group');
  if(seal){
    const r=seal.getBoundingClientRect();
    burst(r.left+r.width/2, r.top+r.height/2, {count:32,colors:['#C4A862','#D9C080','#E8B4B8','#C9B8E8','#F5EDD8','#9CAF88']});
    seal.style.animation='seal-crack 0.7s ease forwards';
  }
  const env=document.getElementById('hero-envelope');
  let sh=0;
  const shk=setInterval(()=>{
    env.style.transform=`translateY(${sh%2===0?-3:3}px) rotate(${sh%2===0?-2:2}deg)`;
    sh++;
    if(sh>6){ clearInterval(shk); env.style.transform='';
      setTimeout(()=>{
        env.style.transition='opacity 0.5s ease'; env.style.opacity='0';
        setTimeout(()=>{
          env.style.display='none';
          document.getElementById('click-hint-svg').style.display='none';
          const ov=document.getElementById('letter-overlay');
          ov.classList.add('open');
          const body=document.getElementById('letter-body');
          const txt=body.dataset.text||'for someone who means the whole world to me...';
          writeText(body,txt,{speed:52,variance:28,delay:400,onDone:()=>{
            setTimeout(()=>document.getElementById('bmark-wrap').classList.add('show'),1200);
          }});
        },500);
      },300);
    }
  },80);
}

/* ── SECRETS ── */
function catClick(e){
  const msgs=['pspspsps 🐾','she saw u. she approved. 🐱','ur energy = certified cat magnet'];
  secretMessage(msgs[Math.floor(Math.random()*3)],e.clientX,e.clientY-44);
  launchHearts(e.clientX,e.clientY-20,4);
}
function candleClick(e){
  document.getElementById('candle-dim').classList.toggle('dimmed');
  secretMessage('some moments r better in the dark 🕯️',e.clientX,e.clientY-44);
  Store.discover('candle_dim');
}
function coffeeClick(e){
  launchHearts(e.clientX,e.clientY-20,6);
  secretMessage('same warmth as her brown eyes ☕',e.clientX,e.clientY-58,{color:'#FAF3E0',duration:3500});
}
function lilyClick(e){
  launchPetals(12,'#F9F7F2');
  secretMessage('lilies — quiet, graceful, beautiful. just like her 🌸',e.clientX,e.clientY-44);
}
function lavenderClick(e){
  launchPetals(14,'#C9B8E8');
  secretMessage('her favourite colour is everywhere tonight 🌿',e.clientX,e.clientY-44);
}
function bookTableClick(e){
  secretMessage('she would have finished this book already 📖',e.clientX,e.clientY-44,{color:'#FAF3E0'});
}
function dogClick(e){
  launchHearts(e.clientX,e.clientY-20,5);
  const msgs=['good boy knows a good person 🐾','golden retriever energy: ur both the same tbh 🐕','he wags his tail when ur name is mentioned'];
  secretMessage(msgs[Math.floor(Math.random()*3)],e.clientX,e.clientY-54,{color:'#FAF3E0'});
  Store.discover('dog_click');
}
/* Bookshelf books */
document.querySelectorAll('#room-svg rect[onclick]').forEach(()=>{});
document.getElementById('room-svg').addEventListener('click',function(e){
  const t=e.target;
  if(t.tagName==='rect' && t.closest && !t.closest('#svg-cat') && !t.closest('#hero-envelope')){
    const fill=t.getAttribute('fill');
    if(fill&&(fill.includes('C9B8E8')||fill.includes('lavender'))){
      secretMessage('the lavender book 🌿 — she would have read this twice',e.clientX,e.clientY-44,{color:'#F0EBFA'});
    }
  }
});

/* ── PARALLAX ── */
document.addEventListener('mousemove',e=>{
  const x=(e.clientX/innerWidth-0.5)*8;
  const env=document.getElementById('hero-envelope');
  if(env&&!opened) env.style.transform=`translateY(${x*0.2}px)`;
});

Store.pageComplete(1);
</script>
